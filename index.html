<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mister G – Game Portal</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles/shared-portal-styles.css">
    <link rel="stylesheet" href="styles/portal-specific.css">
</head>
<body>
    <!-- Tab Navigation -->
    <nav class="tab-navigation">
        <a href="portal.html" class="tab-link active">All Games</a>
        <a href="LS_portal.html" class="tab-link">Lost Soldier</a>
    </nav>

    <img src="fuchs-logo.png" alt="Mister G" class="studio-logo">

    <div class="container">
        <header>
            <h1 class="main-title">Mister G – Game Portal</h1>
            <p class="tagline">Experimentelle Narrativ-Spiele und interaktive Geschichten</p>
        </header>

        <section class="game-section">
            <div class="game-grid">
                <!-- LS: Stillness -->
                <a href="./LS_Stillness/stillness.html" target="_blank" rel="noopener" class="game-card" data-game-id="stillness">
                    <img src="LS_Stillness/assets/images/cabin_out.jpg" alt="LS: Stillness" class="game-preview">
                    <div class="game-content">
                        <h2 class="game-title">LS: Stillness</h2>
                    </div>
                </a>

                <!-- LS: Dead Air -->
                <a href="#" class="game-card" data-game-id="dead_air">
                    <div style="position: relative;">
                        <img src="LS_DeadAir/assets/images/Leitstelle.jpg" alt="LS: Dead Air" class="game-preview">
                        <div class="restricted-badge">KEINE FREIGABE</div>
                    </div>
                    <div class="game-content">
                        <h2 class="game-title">LS: Dead Air</h2>
                    </div>
                </a>

                <!-- Cube Runner -->
                <a href="./runners/index.html" target="_blank" rel="noopener" class="game-card" data-game-id="cube_runner">
                    <img src="runners/Logo2.png" alt="Cube Runner" class="game-preview">
                    <div class="game-content">
                        <h2 class="game-title">Cube Runner</h2>
                    </div>
                </a>

                <!-- Whisker and Stone -->
                <a href="./FoxRun/" target="_blank" rel="noopener" class="game-card" data-game-id="WNS">
                    <div style="position: relative;">
                      <img src="FoxRun/assets/splash.png" alt="Whisker and Stone" class="game-preview">
                      <!-- <div class="restricted-badge">In Produktion</div> -->
                    </div>
                    <div class="game-content">
                        <h2 class="game-title">Whisker and Stone</h2>
                    </div>
                </a>

                 <!-- Cloud for Maybel -->
                <a href="./cloudformaybel/" target="_blank" rel="noopener" class="game-card" data-game-id="CFM">
                    <div style="position: relative;">
                      <img src="cloudformaybel/assets/wallpaper.png" alt="A Cloud for Maybel" class="game-preview">
                      <div class="restricted-badge">Prototyp</div>
                    </div>
                    <div class="game-content">
                        <h2 class="game-title">A Cloud for Maybel</h2>
                    </div>
                </a>

                <a href="#" class="game-card">
                    <div class="preview-placeholder">
                        <span class="placeholder-icon">🎮</span>
                    </div>
                    <div class="game-content">
                        <h2 class="game-title">In Planung</h2>
                    </div>
                </a>
            </div>
        </section>

        <nav class="footer-nav">
            <div class="nav-links">
                <a href="https://misterg-blip.github.io/support" class="nav-link">Support</a>
                <a href="https://misterg-blip.github.io/dev" class="nav-link">Developer</a>
                <a href="https://misterg-blip.github.io/docs/Impressum" class="nav-link">Impressum</a>
            </div>
            <footer>© 2026 MISTER G</footer>
        </nav>
    </div>
    <script type="module">
        import { db } from "./firebase-config.js"; 
        import { trackClick } from "./firebase-config.js";        
        
        document.querySelectorAll(".game-card").forEach(card => {
            card.addEventListener("click", async (e) => {
                const gameId = card.dataset.gameId;
                const href = card.getAttribute("href");

            // Nur zählen, wenn echte Seite vorhanden
            if (!gameId || href === "#") return;

            e.preventDefault(); // Navigation stoppen

            if (!sessionStorage.getItem(gameId)) {
                trackClick(gameId); // 👈 HIER passiert das Zählen
                sessionStorage.setItem(gameId, "true");
            }

            window.open(href, card.target || "_self");
            });
        });
    </script>
</body>
</html>
